name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build docs with warnings denied
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Compile benchmark target
        run: cargo bench --bench performance --no-run

  cross-platform:
    name: Cross-Platform Validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

      - name: Check plain server example
        run: cargo check --example server

      - name: Check axum example
        run: cargo check --example axum_server --features web-example-axum

      - name: Check actix-web example
        run: cargo check --example actix_server --features web-example-actix

      - name: Check hot-reload example
        run: cargo check --example hot_reload --features hot-reload

      - name: Test with no default features
        run: cargo test --no-default-features

      - name: Test with only registry feature
        run: cargo test --no-default-features --features registry